<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Photo Template Studio v3.0</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#d9e1ec;--pri:#315efb;--pri2:#244bd8;--sec:#0f766e;--danger:#b42318}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif}
.wrap{max-width:1240px;margin:auto;padding:12px}
header,.card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 10px 28px rgba(16,24,40,.06)}
header{padding:18px;margin-bottom:12px}
h1{font-size:clamp(23px,4vw,34px);margin:0 0 6px}
h2{font-size:19px;margin:0 0 12px}
h3{font-size:16px;margin:0 0 8px}
.small{font-size:13px;color:var(--muted);line-height:1.65}
.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:12px}
.card{padding:14px;margin-bottom:12px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button,.fileBtn,input,select{font:inherit}
button,.fileBtn{border:0;border-radius:13px;padding:10px 13px;min-height:44px;background:var(--pri);color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;text-decoration:none}
button:hover,.fileBtn:hover{background:var(--pri2)}
button.secondary,.fileBtn.secondary{background:var(--sec)}
button.outline{background:#fff;color:var(--ink);border:1px solid var(--line)}
button.active{background:var(--pri);color:#fff}
button.danger{background:var(--danger)}
button:disabled{opacity:.45}
input[type=file]{display:none}
input[type=number],input[type=text],select{border:1px solid var(--line);border-radius:11px;padding:9px 10px;background:#fff;min-height:42px}
input[type=range]{width:100%;accent-color:var(--pri)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.pairGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.panel{padding:11px;border:1px solid var(--line);border-radius:14px;background:#f8fafc}
.panel.active,.photoRow.active,.previewPane.active{border-color:var(--pri);box-shadow:0 0 0 3px rgba(49,94,251,.15)}
.photoList{display:grid;gap:8px}
.photoRow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fff}
.previewStage{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.previewPane{border:1px solid var(--line);border-radius:14px;padding:8px;background:#fff}
.previewLabel{font-weight:800;margin-bottom:6px}
canvas.editor{display:block;width:100%;height:auto;background:#dfe6ef;border-radius:12px;touch-action:none}
.control{border:1px solid var(--line);border-radius:15px;padding:11px;margin:9px 0;background:#fff}
.labelrow{display:flex;justify-content:space-between;gap:8px;font-size:14px;font-weight:700;margin-bottom:6px}
.toolbar{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.toolbar button{width:100%}
.sheet{background:#fff;border:1px solid var(--line);border-radius:17px;padding:8px;overflow:auto}
#printCanvas{display:block;max-width:100%;height:auto;margin:auto;background:#fff;box-shadow:0 6px 20px rgba(16,24,40,.08)}
.hidden{display:none!important}
.status{margin-top:8px;font-size:13px;color:var(--muted)}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#e8efff;color:#2449c6;font-size:12px;font-weight:700}
details{border:1px solid var(--line);border-radius:15px;padding:9px 11px;margin-top:9px;background:#fff}
summary{cursor:pointer;font-weight:800;min-height:40px;display:flex;align-items:center}
.presetGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.presetCard{text-align:left;display:grid;gap:3px}
.presetCard span{font-size:12px;line-height:1.4}
.albumGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.albumItem{border:1px solid var(--line);border-radius:12px;padding:8px;background:#fff}
.albumItem img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
@media(max-width:560px){
 .wrap{padding:8px}.card,header{border-radius:16px}.pairGrid,.toolbar{grid-template-columns:1fr}
 .tabs{display:grid;grid-template-columns:1fr}.tabs button{width:100%}
 button,.fileBtn{min-height:48px;font-size:15px}.photoRow{grid-template-columns:1fr}.photoRow .row{display:grid;grid-template-columns:1fr 1fr}
 .previewStage{grid-template-columns:1fr 1fr}.presetGrid{grid-template-columns:1fr}.albumGrid{grid-template-columns:repeat(2,1fr)}
 canvas.editor{max-height:44vh;object-fit:contain}
}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>Photo Template Studio v3.0</h1>
<div class="small">キーチェーン、写真用紙、アルバム作成、AIトリミングに対応した統合版です。</div>
</header>

<div class="tabs">
<button id="modeGoods" class="active">グッズ・キーチェーン</button>
<button id="modePhoto" class="outline">写真用紙</button>
<button id="modeAlbum" class="outline">アルバム</button>
</div>

<div class="grid">
<main>

<section id="goodsSection" class="card">
<h2>1. キーチェーン設定</h2>
<div class="pairGrid">
<div class="panel"><h3>左側</h3><div class="row"><label>横 <input id="leftW" type="number" value="24" step="0.1"> mm</label><label>縦 <input id="leftH" type="number" value="33" step="0.1"> mm</label></div></div>
<div class="panel"><h3>右側</h3><div class="row"><label>横 <input id="rightW" type="number" value="24.5" step="0.1"> mm</label><label>縦 <input id="rightH" type="number" value="33.5" step="0.1"> mm</label></div></div>
</div>

<h2 style="margin-top:14px">2. 写真</h2>
<div class="pairGrid">
<div id="leftPanel" class="panel"><h3>左側・個別写真</h3><button id="addLeft">左側写真を追加</button></div>
<div id="rightPanel" class="panel active">
<h3>右側・共通写真</h3>
<label class="fileBtn" for="commonFile">写真を選択</label><input id="commonFile" type="file" accept="image/*">
<div class="row" style="margin-top:8px"><button id="rightPortrait" class="active">縦</button><button id="rightLandscape" class="outline">横</button></div>
</div>
</div>
<div id="leftList" class="photoList" style="margin-top:10px"></div>
<div class="control"><div class="labelrow"><span>各組み合わせの印刷数</span><span id="pairCopiesLabel">1セットずつ</span></div><div class="row"><button id="pairMinus" class="outline">−</button><input id="pairCopies" type="number" value="1" min="1" max="20" style="width:90px;text-align:center"><button id="pairPlus" class="outline">＋</button></div></div>
</section>

<section id="photoSection" class="card hidden">
<h2>1. 写真用紙設定</h2>
<div class="row">
<label>用紙 <select id="paperSize"><option value="square89">ましかく 89×89mm</option>
<option value="DSC">DSC判 89×119mm</option>
<option value="L">L判 89×127mm</option>
<option value="postcard">はがき 100×148mm</option>
<option value="KG">KG（キング）判 102×152mm</option>
<option value="square127">ましかく 127×127mm</option>
<option value="2L">2L判 127×178mm</option>
<option value="8cut">八切 165×216mm</option>
<option value="8cutW">八切ワイド 165×254mm</option>
<option value="A5">A5 148×210mm</option>
<option value="B5">B5 182×257mm</option>
<option value="6cut">六切 203×254mm</option>
<option value="6cutW">六切ワイド 203×305mm</option>
<option value="A4">A4 210×297mm</option>
<option value="4cut">四切 254×305mm</option>
<option value="4cutW">四切ワイド 254×365mm</option>
<option value="B4">B4 257×364mm</option>
<option value="A3">A3 297×420mm</option>
<option value="A3plus">A3ノビ 329×483mm</option></select></label>
<label>向き <select id="paperOrientation"><option value="portrait">縦</option><option value="landscape">横</option></select></label>
<label>枚数 <input id="photoQty" type="number" value="1" min="1" max="20"></label>
</div>
<label class="fileBtn" for="singleFile" style="margin-top:10px">写真を選択</label><input id="singleFile" type="file" accept="image/*">
<div class="small" style="margin-top:8px">
選択したサイズでPDFを作成します。プリンターが対応していない用紙サイズは、プリンタードライバー側で選択できない場合があります。
</div>
</section>

<section id="albumSection" class="card hidden">
<h2>1. アルバム設定</h2>
<div class="row">
<label>用紙 <select id="albumPaper"><option value="square89">ましかく 89×89mm</option>
<option value="L">L判 89×127mm</option>
<option value="postcard">はがき 100×148mm</option>
<option value="KG">KG（キング）判 102×152mm</option>
<option value="square127">ましかく 127×127mm</option>
<option value="2L">2L判 127×178mm</option>
<option value="A5">A5</option>
<option value="B5">B5</option>
<option value="6cut">六切</option>
<option value="A4">A4</option>
<option value="4cut">四切</option>
<option value="B4">B4</option>
<option value="A3">A3</option>
<option value="A3plus">A3ノビ</option></select></label>
<label>向き <select id="albumOrientation"><option value="portrait">縦</option><option value="landscape">横</option></select></label>
<label>レイアウト <select id="albumLayout"><option value="1">1枚</option><option value="2">2枚</option><option value="4">4枚</option><option value="6">6枚</option></select></label>
</div>
<label class="fileBtn" for="albumFiles" style="margin-top:10px">アルバム写真を追加</label><input id="albumFiles" type="file" accept="image/*" multiple>
<div id="albumList" class="albumGrid" style="margin-top:10px"></div>
</section>

<section class="card">
<h2>保存・共有</h2>
<div class="row"><button id="saveProject">保存</button><label class="fileBtn secondary" for="loadProject">読み込み</label><input id="loadProject" type="file" accept=".json,.txt,.ptstudio"></div>
<div id="status" class="status"></div>
</section>

</main>

<aside>
<section class="card">
<h2>編集プレビュー</h2>
<div id="goodsPreview" class="previewStage">
<div id="leftPreviewPane" class="previewPane"><div class="previewLabel">左側</div><canvas id="leftCanvas" class="editor" width="420" height="560"></canvas><button id="chooseLeft" class="outline" style="width:100%;margin-top:6px">左側を調整</button></div>
<div id="rightPreviewPane" class="previewPane active"><div class="previewLabel">右側</div><canvas id="rightCanvas" class="editor" width="420" height="560"></canvas><button id="chooseRight" class="active" style="width:100%;margin-top:6px">右側を編集中</button></div>
</div>
<canvas id="singleCanvas" class="editor hidden" width="660" height="800"></canvas>

<div style="margin-top:10px"><span class="badge">編集中</span> <strong id="editorTitle">右側・共通写真</strong></div>

<div class="toolbar" style="margin-top:8px">
<button id="aiCrop" class="secondary">AIトリミング</button>
<button id="undo" class="outline">1つ前に戻る</button>
</div>
<div class="control"><div class="labelrow"><span>拡大</span><span id="scaleLabel">100%</span></div><input id="scale" type="range" min="50" max="300" value="100"></div>
<div class="control"><div class="labelrow"><span>回転</span><span id="rotLabel">0°</span></div><input id="rot" type="range" min="-180" max="180" value="0"></div>
<div class="toolbar"><button id="rotate90">90°回転</button><button id="flipH" class="outline">左右反転</button><button id="reset" class="outline">リセット</button></div>

<details open>
<summary>写真の見え方</summary>
<div class="presetGrid">
<button data-preset="normal" class="presetCard active"><strong>補正なし</strong><span>元写真をそのまま</span></button>
<button data-preset="auto" class="presetCard outline"><strong>自動補正</strong><span>迷った時のバランス調整</span></button>
<button data-preset="bright" class="presetCard outline"><strong>明るめ</strong><span>暗い室内・逆光向け</span></button>
<button data-preset="soft" class="presetCard outline"><strong>やわらか</strong><span>人物・子ども・ペット向け</span></button>
<button data-preset="skin" class="presetCard outline"><strong>肌きれい</strong><span>顔色を自然に明るく</span></button>
<button data-preset="vivid" class="presetCard outline"><strong>鮮やか</strong><span>青空・旅行・風景向け</span></button>
<button data-preset="travel" class="presetCard outline"><strong>テーマパーク</strong><span>パーク・イベント写真を華やかに</span></button>
<button data-preset="night" class="presetCard outline"><strong>夜景</strong><span>夜・花火・イルミネーション</span></button>
<button data-preset="sharp" class="presetCard outline"><strong>くっきり</strong><span>小さい印刷を見やすく</span></button>
<button data-preset="mono" class="presetCard outline"><strong>モノクロ</strong><span>シンプルな雰囲気</span></button>
</div>
</details>

<h2 style="margin-top:14px">印刷プレビュー</h2>
<div class="sheet"><canvas id="printCanvas" width="1240" height="1754"></canvas></div>
<div class="row" style="margin-top:8px"><button id="savePng">PNG保存</button><button id="savePdf" class="secondary">印刷用PDF</button></div>
</section>
</aside>
</div>
</div>

<script>
const $=id=>document.getElementById(id), MM=1240/210;
const emptyEdit=()=>({img:null,imgData:null,xNorm:0,yNorm:0,scale:1,rot:0,flipH:false,preset:'normal',brightness:0,contrast:0,saturation:0});
const state={mode:'goods',active:{type:'right',index:-1},common:{...emptyEdit(),landscape:false},lefts:[emptyEdit()],single:emptyEdit(),albums:[],leftW:24,leftH:33,rightW:24.5,rightH:33.5,pairCopies:1};
const undoMap=new WeakMap();

function snapshot(e){return {...e,img:e.img}}
function pushUndo(e){const s=undoMap.get(e)||[];s.push(snapshot(e));if(s.length>20)s.shift();undoMap.set(e,s)}
function doUndo(){const e=activeEdit(),s=undoMap.get(e)||[],p=s.pop();if(p){Object.assign(e,p);undoMap.set(e,s);renderAll()}}

function fileData(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})}
function imageFrom(data){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=data})}
async function setFile(edit,file){pushUndo(edit);edit.imgData=await fileData(file);edit.img=await imageFrom(edit.imgData);renderAll()}

function activeEdit(){if(state.mode!=='goods')return state.single;return state.active.type==='right'?state.common:state.lefts[state.active.index]||state.lefts[0]}
function dims(side){
 if(state.mode==='photo'){const m=paperMm($('paperSize').value);return $('paperOrientation').value==='landscape'?{w:m[1],h:m[0]}:{w:m[0],h:m[1]}}
 if(side==='left')return{w:+$('leftW').value,h:+$('leftH').value}
 return state.common.landscape?{w:+$('rightH').value,h:+$('rightW').value}:{w:+$('rightW').value,h:+$('rightH').value}
}
function ellipse(ctx,x,y,w,h){const k=.5522848,rx=w/2,ry=h/2,cx=x+rx,cy=y+ry;ctx.beginPath();ctx.moveTo(cx,y);ctx.bezierCurveTo(cx+rx*k,y,x+w,cy-ry*k,x+w,cy);ctx.bezierCurveTo(x+w,cy+ry*k,cx+rx*k,y+h,cx,y+h);ctx.bezierCurveTo(cx-rx*k,y+h,x,cy+ry*k,x,cy);ctx.bezierCurveTo(x,cy-ry*k,cx-rx*k,y,cx,y);ctx.closePath()}
function rect(ctx,x,y,w,h){ctx.beginPath();ctx.rect(x,y,w,h);ctx.closePath()}
function filterFor(e){const p={normal:'none',auto:'brightness(1.06) contrast(1.05) saturate(1.06)',bright:'brightness(1.14) contrast(1.04)',soft:'brightness(1.08) contrast(.92) saturate(.95)',skin:'brightness(1.11) contrast(.97) saturate(.93)',vivid:'brightness(1.05) contrast(1.12) saturate(1.18)',travel:'brightness(1.09) contrast(1.10) saturate(1.15)',night:'brightness(1.13) contrast(1.07) saturate(1.09)',sharp:'brightness(1.03) contrast(1.18) saturate(1.05)',mono:'grayscale(1) contrast(1.12)'};return p[e.preset]||'none'}
function drawImage(ctx,e,x,y,w,h){if(!e.img)return;const base=Math.max(w/e.img.width,h/e.img.height)*e.scale;ctx.filter=filterFor(e);ctx.translate(x+w/2+e.xNorm*w,y+h/2+e.yNorm*h);ctx.rotate(e.rot*Math.PI/180);ctx.scale(e.flipH?-1:1,1);ctx.drawImage(e.img,-e.img.width*base/2,-e.img.height*base/2,e.img.width*base,e.img.height*base);ctx.filter='none'}
function drawPreview(canvas,side,e,shape='oval'){const ctx=canvas.getContext('2d'),d=dims(side);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#dfe6ef';ctx.fillRect(0,0,canvas.width,canvas.height);const pad=34,sc=Math.min((canvas.width-pad*2)/d.w,(canvas.height-pad*2)/d.h),w=d.w*sc,h=d.h*sc,x=(canvas.width-w)/2,y=(canvas.height-h)/2;ctx.save();shape==='oval'?ellipse(ctx,x,y,w,h):rect(ctx,x,y,w,h);ctx.clip();if(e.img)drawImage(ctx,e,x,y,w,h);ctx.restore();ctx.strokeStyle='#315efb';ctx.lineWidth=3;shape==='oval'?ellipse(ctx,x,y,w,h):rect(ctx,x,y,w,h);ctx.stroke()}
function renderLefts(){const box=$('leftList');box.innerHTML='';state.lefts.forEach((e,i)=>{const r=document.createElement('div');r.className='photoRow'+(state.active.type==='left'&&state.active.index===i?' active':'');r.innerHTML=`<div><strong>左側写真 ${i+1}</strong><div class="small">${e.img?'選択済み':'未選択'}</div></div>`;const c=document.createElement('div');c.className='row';const l=document.createElement('label');l.className='fileBtn';l.textContent='写真を選択';const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=ev=>ev.target.files[0]&&setFile(e,ev.target.files[0]);l.appendChild(inp);const b=document.createElement('button');b.className='outline';b.textContent='調整';b.onclick=()=>{state.active={type:'left',index:i};renderAll()};c.append(l,b);r.append(c);box.append(r)})}
function renderAlbumList(){const box=$('albumList');box.innerHTML='';state.albums.forEach((e,i)=>{const d=document.createElement('div');d.className='albumItem';d.innerHTML=`<img src="${e.imgData}"><div class="small">写真 ${i+1}</div>`;box.append(d)})}
function renderAll(){renderLefts();renderAlbumList();if(state.mode==='goods'){drawPreview($('leftCanvas'),'left',state.lefts[state.active.index]||state.lefts[0]);drawPreview($('rightCanvas'),'right',state.common);$('editorTitle').textContent=state.active.type==='right'?'右側・共通写真':`左側写真 ${state.active.index+1}`}else if(state.mode==='photo'){drawPreview($('singleCanvas'),'single',state.single,'rect');$('editorTitle').textContent='写真用紙'}const e=activeEdit();$('scale').value=e.scale*100;$('rot').value=e.rot;$('scaleLabel').textContent=Math.round(e.scale*100)+'%';$('rotLabel').textContent=Math.round(e.rot)+'°';document.querySelectorAll('[data-preset]').forEach(b=>{b.classList.toggle('active',b.dataset.preset===e.preset);b.classList.toggle('outline',b.dataset.preset!==e.preset)});renderPrint()}
function setMode(m){state.mode=m;['Goods','Photo','Album'].forEach(x=>{$('mode'+x).classList.toggle('active',m===x.toLowerCase());$('mode'+x).classList.toggle('outline',m!==x.toLowerCase())});$('goodsSection').classList.toggle('hidden',m!=='goods');$('photoSection').classList.toggle('hidden',m!=='photo');$('albumSection').classList.toggle('hidden',m!=='album');$('goodsPreview').classList.toggle('hidden',m!=='goods');$('singleCanvas').classList.toggle('hidden',m!=='photo');renderAll()}
$('modeGoods').onclick=()=>setMode('goods');$('modePhoto').onclick=()=>setMode('photo');$('modeAlbum').onclick=()=>setMode('album');

$('commonFile').onchange=e=>e.target.files[0]&&setFile(state.common,e.target.files[0]);$('singleFile').onchange=e=>e.target.files[0]&&setFile(state.single,e.target.files[0]);
$('albumFiles').onchange=async e=>{for(const f of e.target.files){const d=await fileData(f);state.albums.push({imgData:d,img:await imageFrom(d)})}renderAll()};
$('addLeft').onclick=()=>{if(state.lefts.length<4){state.lefts.push(emptyEdit());renderAll()}};
$('chooseRight').onclick=()=>{state.active={type:'right',index:-1};renderAll()};$('chooseLeft').onclick=()=>{state.active={type:'left',index:0};renderAll()};
$('rightPortrait').onclick=()=>{state.common.landscape=false;renderAll()};$('rightLandscape').onclick=()=>{state.common.landscape=true;renderAll()};
$('pairMinus').onclick=()=>{$('pairCopies').value=Math.max(1,+$('pairCopies').value-1);renderAll()};$('pairPlus').onclick=()=>{$('pairCopies').value=+$('pairCopies').value+1;renderAll()};$('pairCopies').oninput=renderAll;
$('scale').oninput=e=>{activeEdit().scale=+e.target.value/100;renderAll()};$('rot').oninput=e=>{activeEdit().rot=+e.target.value;renderAll()};$('rotate90').onclick=()=>{pushUndo(activeEdit());activeEdit().rot=(activeEdit().rot+90)%360;renderAll()};$('flipH').onclick=()=>{pushUndo(activeEdit());activeEdit().flipH=!activeEdit().flipH;renderAll()};$('reset').onclick=()=>{pushUndo(activeEdit());Object.assign(activeEdit(),emptyEdit(),{img:activeEdit().img,imgData:activeEdit().imgData});renderAll()};$('undo').onclick=doUndo;
document.querySelectorAll('[data-preset]').forEach(b=>b.onclick=()=>{pushUndo(activeEdit());activeEdit().preset=b.dataset.preset;renderAll()});

async function aiCrop(){const e=activeEdit();if(!e.img){$('status').textContent='写真を選択してください。';return}pushUndo(e);try{if('FaceDetector'in window){const fd=new FaceDetector({fastMode:true,maxDetectedFaces:5});const faces=await fd.detect(e.img);if(faces.length){let minX=Infinity,minY=Infinity,maxX=0,maxY=0;faces.forEach(f=>{const b=f.boundingBox;minX=Math.min(minX,b.x);minY=Math.min(minY,b.y);maxX=Math.max(maxX,b.x+b.width);maxY=Math.max(maxY,b.y+b.height)});const cx=(minX+maxX)/2/e.img.width-.5,cy=(minY+maxY)/2/e.img.height-.5;e.xNorm=-cx;e.yNorm=-cy;e.scale=Math.max(1,Math.min(2.2,1/(Math.max((maxX-minX)/e.img.width,(maxY-minY)/e.img.height)*2.2)));$('status').textContent='顔を検出して中央へ配置しました。';renderAll();return}}e.xNorm=0;e.yNorm=0;e.scale=1;$('status').textContent='顔検出に未対応のため、中央基準で配置しました。';renderAll()}catch{e.xNorm=0;e.yNorm=0;e.scale=1;renderAll()}}
$('aiCrop').onclick=aiCrop;

function drawPiece(ctx,e,x,y,w,h,shape='oval'){ctx.save();shape==='oval'?ellipse(ctx,x,y,w,h):rect(ctx,x,y,w,h);ctx.clip();ctx.fillStyle='#fff';ctx.fillRect(x,y,w,h);if(e.img)drawImage(ctx,e,x,y,w,h);ctx.restore();ctx.strokeStyle='#aaa';ctx.lineWidth=1;shape==='oval'?ellipse(ctx,x,y,w,h):rect(ctx,x,y,w,h);ctx.stroke()}
function paperMm(code){
 const sizes={
  square89:[89,89],
  DSC:[89,119],
  L:[89,127],
  postcard:[100,148],
  KG:[102,152],
  square127:[127,127],
  '2L':[127,178],
  A5:[148,210],
  '8cut':[165,216],
  '8cutW':[165,254],
  B5:[182,257],
  '6cut':[203,254],
  '6cutW':[203,305],
  A4:[210,297],
  '4cut':[254,305],
  '4cutW':[254,365],
  B4:[257,364],
  A3:[297,420],
  A3plus:[329,483]
 };
 return sizes[code]||[210,297];
}
function sizeCanvasForMm(canvas,wMm,hMm){
 canvas.width=Math.max(1,Math.round(wMm*MM));
 canvas.height=Math.max(1,Math.round(hMm*MM));
}
function renderPrint(){
 const c=$('printCanvas'),ctx=c.getContext('2d');

 if(state.mode==='goods'){
  sizeCanvasForMm(c,210,297);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  let x=70,y=70,g=40;
  for(let i=0;i<state.lefts.length;i++){
   for(let q=0;q<+$('pairCopies').value;q++){
    const ld=dims('left'),rd=dims('right'),lw=ld.w*MM,lh=ld.h*MM,rw=rd.w*MM,rh=rd.h*MM;
    if(x+lw+g+rw>c.width-70){x=70;y+=Math.max(lh,rh)+60}
    if(y+Math.max(lh,rh)>c.height-70)return;
    drawPiece(ctx,state.lefts[i],x,y,lw,lh);
    drawPiece(ctx,state.common,x+lw+g,y,rw,rh);
    x+=lw+g+rw+40;
   }
  }
 }else if(state.mode==='photo'){
  let [wMm,hMm]=paperMm($('paperSize').value);
  if($('paperOrientation').value==='landscape')[wMm,hMm]=[hMm,wMm];
  sizeCanvasForMm(c,wMm,hMm);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  drawPiece(ctx,state.single,0,0,c.width,c.height,'rect');
 }else{
  let [wMm,hMm]=paperMm($('albumPaper').value);
  if($('albumOrientation').value==='landscape')[wMm,hMm]=[hMm,wMm];
  sizeCanvasForMm(c,wMm,hMm);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  const layout=+$('albumLayout').value;
  const cols=layout===1?1:layout===2?2:layout===4?2:3;
  const rows=Math.ceil(layout/cols);
  const margin=6*MM,gap=3*MM;
  const cellW=(c.width-margin*2-gap*(cols-1))/cols;
  const cellH=(c.height-margin*2-gap*(rows-1))/rows;
  state.albums.slice(0,layout).forEach((e,i)=>{
   const col=i%cols,row=Math.floor(i/cols);
   drawPiece(ctx,e,margin+col*(cellW+gap),margin+row*(cellH+gap),cellW,cellH,'rect');
  });
 }
}
['leftW','leftH','rightW','rightH','paperSize','paperOrientation','photoQty','albumPaper','albumOrientation','albumLayout'].forEach(id=>$(id).oninput=renderAll);

function saveCanvas(name,type='png'){const a=document.createElement('a');a.download=name;a.href=$('printCanvas').toDataURL(type==='jpg'?'image/jpeg':'image/png',.95);a.click()}
$('savePng').onclick=()=>saveCanvas('photo-template.png');
$('savePdf').onclick=()=>{const a=document.createElement('a');a.download='photo-template.jpg';a.href=$('printCanvas').toDataURL('image/jpeg',.96);a.click();$('status').textContent='PDF互換用の高画質JPGを保存しました。'};
$('saveProject').onclick=()=>{const p={...state,common:{...state.common,img:null},lefts:state.lefts.map(e=>({...e,img:null})),single:{...state.single,img:null},albums:state.albums.map(e=>({...e,img:null}))};const b=new Blob([JSON.stringify(p)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='photo-template-v3.json';a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)};
$('loadProject').onchange=async e=>{try{const p=JSON.parse(await e.target.files[0].text());Object.assign(state,p);for(const x of [state.common,state.single,...state.lefts,...state.albums])if(x.imgData)x.img=await imageFrom(x.imgData);setMode(state.mode||'goods')}catch{$('status').textContent='読み込みに失敗しました。'}};

renderAll();
</script>
